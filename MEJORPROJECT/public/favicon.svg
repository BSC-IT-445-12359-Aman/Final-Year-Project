<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#667eea"/>
  
  <!-- Travel Bag/Suitcase -->
  <rect x="25" y="35" width="50" height="35" rx="5" fill="#FFD700"/>
  <rect x="30" y="40" width="40" height="25" rx="3" fill="#667eea"/>
  
  <!-- Handle -->
  <rect x="42" y="25" width="16" height="12" rx="3" fill="#FFD700"/>
  
  <!-- Lock -->
  <circle cx="50" cy="52" r="3" fill="#fff"/>
  
  <!-- Travel Lines (Motion) -->
  <path d="M 15 50 L 10 50" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <path d="M 85 50 L 90 50" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <path d="M 50 15 L 50 10" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <path d="M 50 85 L 50 90" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Small Stars -->
  <text x="20" y="25" font-size="8" fill="#FFD700">✦</text>
  <text x="75" y="25" font-size="8" fill="#FFD700">✦</text>
  <text x="20" y="75" font-size="8" fill="#FFD700">✦</text>
  <text x="75" y="75" font-size="8" fill="#FFD700">✦</text>
</svg>
